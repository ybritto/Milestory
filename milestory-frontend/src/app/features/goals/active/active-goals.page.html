<section class="active-goals-page" aria-labelledby="active-goals-title">
  <p class="active-goals-page__eyebrow">Active goal scan</p>
  <h1 id="active-goals-title">Active goals</h1>
  <p class="active-goals-page__summary">
    A denser scan of your active goals, with the same progress, checkpoint, and accomplishment
    signals you see on the dashboard.
  </p>

  <div class="active-goals-page__list">
    @for (goal of goalCards(); track goal.goalId) {
      <app-goal-summary-card [goal]="goal" />
    }
  </div>
</section>
